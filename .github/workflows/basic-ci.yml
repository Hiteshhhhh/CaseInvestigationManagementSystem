name: CI with Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-docker:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore dependencies
      - name: Restore
        run: dotnet restore

      # 4️⃣ Build
      - name: Build
        run: dotnet build --no-restore

      # 5️⃣ (Optional but good) Run Tests
      - name: Test
        run: echo "No tests yet"

      # 6️⃣ Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/case-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/case-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/case-app:latest

      # 8️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/case-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/case-app:latest