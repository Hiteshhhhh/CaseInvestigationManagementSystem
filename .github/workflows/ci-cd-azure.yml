name: Build, Push, and Deploy to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: caseinvestigationmanagementsystem

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set ACR Login Server
        shell: bash
        run: |
          echo "ACR_LOGIN_SERVER=${{ secrets.AZURE_ACR_NAME }}.azurecr.io" >> "$GITHUB_ENV"

      - name: ACR Login
        shell: bash
        run: |
          az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App for Containers
        shell: bash
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --docker-custom-image-name "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --docker-registry-server-url "https://${{ env.ACR_LOGIN_SERVER }}"

      - name: Configure app settings (including DB connection)
        shell: bash
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --settings \
              WEBSITES_PORT=8080 \
              ASPNETCORE_ENVIRONMENT=Production \
              ConnectionStrings__DefaultConnection="${{ secrets.AZURE_CONNECTIONSTRING }}"

      - name: Restart Web App
        shell: bash
        run: |
          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}"

