name: Build, Push, and Deploy to Azure

on:
  workflow_dispatch:

env:
  IMAGE_NAME: caseinvestigationmanagementsystem

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set ACR Login Server
        run: echo "ACR_LOGIN_SERVER=${{ secrets.AZURE_ACR_NAME }}.azurecr.io" >> $GITHUB_ENV

      - name: ACR Login
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --docker-custom-image-name $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} \
            --docker-registry-server-url https://$ACR_LOGIN_SERVER

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --settings \
              WEBSITES_PORT=8080 \
              ASPNETCORE_ENVIRONMENT=Production \
              ConnectionStrings__DefaultConnection="${{ secrets.AZURE_CONNECTIONSTRING }}"

      - name: Restart Web App
        run: |
          az webapp restart \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }}